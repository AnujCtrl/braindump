<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>braindump capture</title>
    <link rel="stylesheet" href="capture.css" />
  </head>
  <body>
    <main class="capture">
      <header class="capture-header">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-name">braindump</div>
          <span class="brand-sep">·</span>
          <span class="brand-sub">CAPTURE</span>
        </div>
        <button id="close" class="close-btn" aria-label="close" title="close (Esc / X)">
          <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
            <path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
        </button>
      </header>
      <textarea
        id="capture"
        autofocus
        rows="5"
        placeholder="Say it now, sort it later. ⌘/Ctrl+Enter saves. Esc or X closes. Lines starting with `-` split into multiple todos."
      ></textarea>
      <footer class="capture-footer">
        <div id="status" aria-live="polite"></div>
        <div class="hint">
          <kbd>⌘↵</kbd>
          <span>save</span>
          <span class="sep">·</span>
          <kbd>esc</kbd>
          <span>close</span>
        </div>
      </footer>
    </main>
    <script type="module" src="capture.js"></script>
  </body>
</html>
